services:
  kernel:
    build: .
    container_name: cda-kernel
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - cda-network
    environment:
      - PYTHONPATH=/app
    # Ensure uvicorn is using 0.0.0.0 to accept external connections from the host
    command: python3 -m uvicorn cda.kernel.engine:app --host 0.0.0.0 --port 8000 --reload

  gate:
    build: .
    container_name: cda-gate
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    networks:
      - cda-network
    environment:
      - PYTHONPATH=/app
    command: python3 -m uvicorn cda.gate.engine:app --host 0.0.0.0 --port 8001 --reload

  monitor:
    build: .
    container_name: cda-monitor
    ports:
      - "8002:8002"
    volumes:
      - .:/app
    networks:
      - cda-network
    environment:
      - PYTHONPATH=/app
    command: python3 -m uvicorn cda.shared.monitor:app --host 0.0.0.0 --port 8002 --reload

networks:
  cda-network:
    driver: bridge