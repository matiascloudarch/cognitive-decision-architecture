services:
  kernel:
    build: .
    container_name: cda-kernel
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - cda-network
    environment:
      - PYTHONPATH=/app
      - CDA_SECRET_KEY=internal_development_secret_key_fixed_32_chars
    command: python3 -m uvicorn cda.kernel.engine:app --host 0.0.0.0 --port 8000 --reload

  gate:
    build: .
    container_name: cda-gate
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    networks:
      - cda-network
    environment:
      - PYTHONPATH=/app
      - CDA_SECRET_KEY=internal_development_secret_key_fixed_32_chars
    command: python3 -m uvicorn cda.gate.engine:app --host 0.0.0.0 --port 8001 --reload

networks:
  cda-network:
    driver: bridge